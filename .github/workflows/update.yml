name: Update apps

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        app: [claude-desktop, dockdoor, cryptomator]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check for update
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if bash scripts/update-app.sh "${{ matrix.app }}" --check; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply update
        if: steps.check.outputs.update_needed == 'true'
        id: apply
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/update-app.sh "${{ matrix.app }}"
          echo "version=$(jq -r '.["${{ matrix.app }}"].version' apps.json)" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.check.outputs.update_needed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ${{ matrix.app }} to ${{ steps.apply.outputs.version }}"
          title: "chore: update ${{ matrix.app }} to ${{ steps.apply.outputs.version }}"
          body: |
            Automated update of `${{ matrix.app }}` to version `${{ steps.apply.outputs.version }}`.

            - Bumped `version` and per-platform `url` + `hash` in `apps.json`
            - Build verified on the runner before this PR was opened
          branch: update/${{ matrix.app }}-${{ steps.apply.outputs.version }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable auto-merge
        if: steps.check.outputs.update_needed == 'true' && steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.pull-request-number }}" --auto --squash --delete-branch
