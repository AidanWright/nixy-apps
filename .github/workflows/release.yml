name: Release

# Cuts a CalVer release and moves the `latest` tag whenever the app set changes
# on main. Triggered by Build completing (workflow_run fires even when the merge
# was made by GITHUB_TOKEN, which a plain push trigger would not). Manual
# dispatch always cuts a release from the current main.
on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Cut release when apps.json changed
        run: |
          set -euo pipefail
          git fetch --tags --force
          sha="$(git rev-parse HEAD)"

          # Release runs on every hourly Build, so don't re-release an unchanged
          # commit: skip if it's already released, or if no app version changed.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            released="$(git rev-parse -q --verify 'refs/tags/latest^{commit}' 2>/dev/null || true)"
            if [ "$released" = "$sha" ]; then
              echo "Commit $sha already released (latest points here); nothing to do."
              exit 0
            fi
            old="$(git show "${sha}^:apps.json" 2>/dev/null \
              | jq -S 'map_values(.version)' 2>/dev/null || echo '{}')"
            new="$(jq -S 'map_values(.version)' apps.json)"
            if [ "$old" = "$new" ]; then
              echo "No app version changed; nothing to release."
              exit 0
            fi
          fi

          # CalVer tag, disambiguated if several land the same day.
          base="v$(date -u +%Y.%m.%d)"
          tag="$base"; n=1
          while git rev-parse "refs/tags/$tag" >/dev/null 2>&1 \
            || gh release view "$tag" >/dev/null 2>&1; do
            tag="$base.$n"; n=$((n + 1))
          done

          notes="$(jq -r 'to_entries | map("- **\(.key)** `\(.value.version)`") | .[]' apps.json)"

          gh release create "$tag" \
            --target "$sha" \
            --title "$tag" \
            --notes "$notes"

          # Move the tracking tag consumers pin (github:.../latest).
          git tag -f latest "$sha"
          git push -f origin refs/tags/latest
