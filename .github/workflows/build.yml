name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-13] # arm64, x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # Pushes built bundles to the cache only from main; PRs build without pushing.
      - uses: cachix/cachix-action@v15
        with:
          name: nixy-apps
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: ${{ github.ref != 'refs/heads/main' && '.*' || '' }}

      - name: Build all apps
        run: nix build .#claude-desktop .#dockdoor .#cryptomator --print-build-logs
