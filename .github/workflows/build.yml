name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Runs after the hourly update workflow so a merged app bump gets built and
  # cached. A GITHUB_TOKEN merge does not fire `push`, but workflow_run does.
  workflow_run:
    workflows: ["Update apps"]
    types: [completed]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Only Apple Silicon is built/cached: Intel macOS runners queue for a very long
  # time on the free tier. The x86_64-darwin packages still build on demand for
  # anyone who needs them; they just aren't pre-cached.
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # Pushes built bundles to the cache only from main; PRs build without pushing.
      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: aidanwright
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: ${{ github.ref != 'refs/heads/main' && '.*' || '' }}

      - name: Build all apps
        run: nix build .#claude-desktop .#dockdoor .#cryptomator .#stremio --print-build-logs
